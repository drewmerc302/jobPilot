<div class="status-slot">
  <select class="badge badge-{{ status }}"
          style="border:none;cursor:pointer;padding:2px 6px;font-size:12px;width:100%"
          hx-post="/matches/{{ job_id }}/status"
          hx-target="closest .status-slot"
          hx-swap="outerHTML"
          name="status">
    {% for s in ["new","interested","applied","interviewing","offer","rejected","withdrawn"] %}
    <option value="{{ s }}" {% if status == s %}selected{% endif %}>{{ s|capitalize }}</option>
    {% endfor %}
  </select>
</div>
