<tr class="match-row" data-job-id="{{ m.job_id }}">
  <td>
    <a href="/matches/{{ m.job_id }}" style="text-decoration:none;color:inherit">
      <div class="match-company">{{ m.company }}</div>
      <div class="match-title" style="color:var(--blue)">{{ m.title }}</div>
    </a>
  </td>
  <td class="muted" style="font-size:13px;white-space:nowrap">{{ m.location or '—' }}</td>
  <td>
    <span class="match-score">{{ "%.0f"|format(m.relevance_score * 100) }}%</span>
  </td>
  <td>
    <span class="match-reason">{{ m.match_reason or '' }}</span>
  </td>
  <td>
    {% with job_id=m.job_id, status=m.status %}
    {% include "_partials/status_badge.html" %}
    {% endwith %}
  </td>
  <td>
    <div style="display:flex;gap:6px;align-items:center">
      {% if m.resume_path %}
      <a href="{{ m.resume_path }}" target="_blank" rel="noopener" class="btn btn-success btn-sm">PDF ↗</a>
      {% endif %}
      <a href="/matches/{{ m.job_id }}" class="btn btn-outline btn-sm details-btn">Job Details (D)</a>
      <button class="btn btn-outline btn-sm dismiss-btn"
              hx-post="/matches/{{ m.job_id }}/dismiss"
              hx-target="closest tr"
              hx-swap="outerHTML"
              title="Dismiss this match">
        Dismiss (X)
      </button>
    </div>
  </td>
</tr>
