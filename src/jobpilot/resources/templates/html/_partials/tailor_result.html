{% if result and result.resume_pdf %}
<div style="display:flex;flex-direction:column;gap:6px">
  <a href="{{ result.resume_pdf }}" target="_blank" rel="noopener" class="btn btn-success btn-sm">
    ✓ Open tailored resume ↗
  </a>
  <a href="/matches/{{ job_id }}" style="font-size:12px;color:var(--blue)">
    View edits &amp; analysis →
  </a>
</div>
{% else %}
<span class="error">Tailor failed — Typst binary may be missing.</span>
{% endif %}
